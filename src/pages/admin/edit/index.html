<!DOCTYPE html>
<html lang="en">
<head>
<!-- @include partials/head-admin.html -->
    <title>Edit Article — Vic Valentine</title>
    <script src="/static/js/block-editor.js"></script>
</head>
<body>
<!-- @include partials/nav.html -->

    <main>
        <div class="admin-layout">
            <div class="container" style="max-width: 960px;">
                <div class="admin-header">
                    <h2 id="page-title">New Article</h2>
                    <a href="/admin/" class="btn btn--outline btn--small">Back</a>
                </div>

                <form id="post-form">
                    <div class="form-group">
                        <label for="title">Title</label>
                        <input type="text" id="title" required>
                    </div>
                    <div class="form-group">
                        <label for="subheading">Subheading</label>
                        <input type="text" id="subheading" placeholder="Shown on Mag card hover">
                    </div>

                    <div class="form-group">
                        <div class="block-card block-card--cover">
                            <div class="block-card__header">
                                <span class="block-card__type">Cover image</span>
                            </div>
                            <div class="block-card__body">
                                <p class="form-hint">Shown on the Mag listing. If you skip this, the first image in the article is used.</p>
                                <input type="hidden" id="cover_image_path" value="">
                                <div id="cover_image_slot" class="block-image-slot"></div>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="cover_alt">Cover Image Alt Text</label>
                        <input type="text" id="cover_alt" placeholder="Describes the cover image used on the Mag listing">
                    </div>

                    <div class="form-group">
                        <label>Content Blocks</label>
                        <div class="block-editor">
                            <div class="block-editor__toolbar">
                                <span>Add:</span>
                                <button type="button" data-add="heading">Heading</button>
                                <button type="button" data-add="paragraph">Paragraph</button>
                                <button type="button" data-add="single_image">Image</button>
                                <button type="button" data-add="image_text">Image + Description</button>
                                <button type="button" data-add="triple_image">Three Images</button>
                            </div>
                            <div class="block-editor__blocks" id="blocks-container"></div>
                        </div>
                        <input type="hidden" id="blocks-json" value="[]">
                    </div>

                    <div class="form-group">
                        <label style="display: inline-flex; align-items: center; gap: 0.5rem; cursor: pointer; text-transform: none; letter-spacing: 0; font-size: 0.95rem; color: var(--color-text);">
                            <input type="checkbox" id="published">
                            Publish
                        </label>
                    </div>

                    <button type="submit" class="btn btn--primary" id="submit-btn">Create Article</button>
                </form>
            </div>
        </div>
    </main>

<!-- @include partials/footer.html -->
<!-- @include partials/scripts-admin.html -->
    <script>
    let postId = null;
    let editor;

    (async () => {
        if (!db) {
            alert('Loading… If the content does not appear, reload the page.');
            location.href = '/admin/login/';
            return;
        }
        const { data: { user } } = await db.auth.getUser();
        if (!user) { location.href = '/admin/login/'; return; }

        const container = document.getElementById('blocks-container');
        const jsonInput = document.getElementById('blocks-json');
        const titleInput = document.getElementById('title');
        const coverPathInput = document.getElementById('cover_image_path');
        const coverSlot = document.getElementById('cover_image_slot');

        async function uploadCoverFile(file) {
            if (!file || !file.type.startsWith('image/')) return;
            const folder = slugify(titleInput.value) || 'uploads';
            const ext = file.name.split('.').pop().toLowerCase();
            const path = `${folder}/cover-${crypto.randomUUID()}.${ext}`;
            const { error } = await db.storage.from(STORAGE_BUCKET).upload(path, file, { contentType: file.type });
            if (error) {
                showFlash('Cover upload failed: ' + error.message, 'error');
                return;
            }
            coverPathInput.value = path;
            renderCoverSlot();
        }

        function renderCoverSlot() {
            const path = coverPathInput.value.trim();
            coverSlot.innerHTML = '';
            if (path) {
                const preview = document.createElement('div');
                preview.className = 'block-image-preview';
                const img = document.createElement('img');
                img.src = storageUrl(path);
                img.alt = '';
                const rm = document.createElement('button');
                rm.type = 'button';
                rm.className = 'block-image-remove';
                rm.title = 'Remove image';
                rm.innerHTML = '&times;';
                rm.addEventListener('click', () => {
                    coverPathInput.value = '';
                    renderCoverSlot();
                });
                preview.appendChild(img);
                preview.appendChild(rm);
                coverSlot.appendChild(preview);
                return;
            }
            const area = document.createElement('div');
            area.className = 'block-image-upload';
            const p = document.createElement('p');
            p.innerHTML = 'Cover image &mdash; click or drag to upload';
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = 'image/*';
            fileInput.style.display = 'none';
            area.appendChild(p);
            area.appendChild(fileInput);
            area.addEventListener('click', (e) => {
                if (e.target !== fileInput) fileInput.click();
            });
            area.addEventListener('dragover', (e) => {
                e.preventDefault();
                area.classList.add('dragover');
            });
            area.addEventListener('dragleave', () => area.classList.remove('dragover'));
            area.addEventListener('drop', (e) => {
                e.preventDefault();
                area.classList.remove('dragover');
                const f = e.dataTransfer.files[0];
                if (f) uploadCoverFile(f);
            });
            fileInput.addEventListener('change', () => {
                const f = fileInput.files[0];
                if (f) uploadCoverFile(f);
                fileInput.value = '';
            });
            coverSlot.appendChild(area);
        }

        const base = `${SUPABASE_URL}/storage/v1/object/public/${STORAGE_BUCKET}/`;

        const params = new URLSearchParams(location.search);
        postId = params.get('id') ? parseInt(params.get('id')) : null;

        let initial = [];
        if (postId) {
            const { data: post } = await db.from('posts').select('*').eq('id', postId).single();
            if (post) {
                document.getElementById('title').value = post.title || '';
                document.getElementById('subheading').value = post.subheading || '';
                document.getElementById('cover_alt').value = post.cover_alt || '';
                if (post.cover_image) coverPathInput.value = post.cover_image;
                document.getElementById('published').checked = !!post.published;
                    document.getElementById('page-title').textContent = 'Edit Article';
                    document.getElementById('submit-btn').textContent = 'Update Article';
                    document.title = 'Edit Article — Vic Valentine';
                try { initial = JSON.parse(post.body); } catch {}
                if (!Array.isArray(initial)) initial = [];
            }
        }

        renderCoverSlot();

        editor = new BlockEditor(container, jsonInput, initial, base, titleInput);

        document.querySelectorAll('.block-editor__toolbar button[data-add]').forEach(btn => {
            btn.addEventListener('click', () => editor.addBlock(btn.dataset.add));
        });
    })();

    document.getElementById('post-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const title = document.getElementById('title').value.trim();
        if (!title) { showFlash('Title is required.', 'error'); return; }
        const subheading = document.getElementById('subheading').value.trim();

        const blocks = editor.blocks.map(b => { const { key, ...rest } = b; return rest; });
        const body = JSON.stringify(blocks);
        const bodyHtml = renderBlocksToHtml(blocks);
        const slug = slugify(title);
        const manualCover = document.getElementById('cover_image_path').value.trim();
        const coverImage = manualCover || extractFirstImage(blocks);
        const coverAlt = document.getElementById('cover_alt').value.trim();
        const published = document.getElementById('published').checked ? 1 : 0;
        const now = new Date().toISOString();

        const postData = {
            title,
            subheading,
            slug,
            body,
            body_html: bodyHtml,
            cover_image: coverImage,
            cover_alt: coverAlt,
            published,
            updated_at: now
        };
        let error;

        if (postId) {
            ({ error } = await db.from('posts').update(postData).eq('id', postId));
        } else {
            postData.created_at = now;
            ({ error } = await db.from('posts').insert(postData));
        }

        if (error) {
            showFlash('Save failed: ' + error.message, 'error');
        } else {
            showFlash('Article saved!', 'success');
            setTimeout(() => { location.href = '/admin/'; }, 500);
        }
    });
    </script>
</body>
</html>
