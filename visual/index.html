<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#010101">
    <script src="https://cdn.jsdelivr.net/npm/@hotwired/turbo@8.0.12/dist/turbo.es2017-umd.js"></script>
    <script src="/static/js/turbo-persist-music-dock.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Datatype:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <title>Visual — Vic Valentine</title>
</head>
<body>
    <nav class="nav">
        <div class="container nav__inner">
            <div class="nav__spacer" aria-hidden="true"></div>
            <div class="nav__center">
                <div class="nav__links">
                    <a href="/">Home</a>
                    <a href="/visual/">Visual</a>
                    <a href="/audio/">Audio</a>
                    <a href="/code/">Code</a>
                    <a href="/mag/">Mag</a>
                </div>
            </div>
            <div class="nav__trailing">
                <button type="button" class="nav__hamburger" aria-label="Menu" aria-expanded="false">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
        <a href="/admin/" class="nav__admin-icon" data-turbo="false" aria-label="Admin" title="Admin">
            <svg class="nav__admin-icon__svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="3" y="3" width="7" height="9" rx="1.2"/>
                <rect x="14" y="3" width="7" height="5" rx="1.2"/>
                <rect x="14" y="12" width="7" height="9" rx="1.2"/>
                <rect x="3" y="16" width="7" height="5" rx="1.2"/>
            </svg>
        </a>
    </nav>
    <main>
        <section class="section section--art section--art-flush">
            <div class="art-hero" role="region" aria-label="Barbican">
                <video class="art-hero__media" autoplay muted loop playsinline webkit-playsinline preload="metadata" tabindex="-1" disablepictureinpicture controlslist="nodownload nofullscreen noremoteplayback" aria-label="Barbican" data-desktop-src="/public/barbican.mp4" data-mobile-src="/public/barbican-mobile.mp4">
                    <p class="art-hero__fallback">Your browser can't play this video inline. <a href="/public/barbican.mp4">Download Barbican (MP4)</a></p>
                </video>
            </div>

            <div class="container art-page__videos">
                <div class="film-hopkingdom">
                    <h2 class="film-hopkingdom__title">Hopkingdom</h2>
                    <div class="film-hopkingdom__grid">
                        <figure class="film-still film-still--1" data-lightbox>
                            <img src="/public/hopkingdom1.jpg" alt="Hopkingdom, photograph 1" width="1200" height="800" loading="lazy">
                            <figcaption class="film-still__caption">credit - rory dinwoodie</figcaption>
                        </figure>
                        <figure class="film-still film-still--2" data-lightbox>
                            <img src="/public/hopkingdom2.jpg" alt="Hopkingdom, photograph 2" width="1200" height="800" loading="lazy">
                            <figcaption class="film-still__caption">credit - the stretch</figcaption>
                        </figure>
                        <figure class="film-still film-still--3" data-lightbox>
                            <img src="/public/hopkingdom3.jpg" alt="Hopkingdom, photograph 3" width="1200" height="800" loading="lazy">
                            <figcaption class="film-still__caption">credit - the stretch</figcaption>
                        </figure>
                        <figure class="film-still film-still--4" data-lightbox>
                            <img src="/public/hopkingdom4.jpg" alt="Hopkingdom, photograph 4" width="1200" height="800" loading="lazy">
                            <figcaption class="film-still__caption">credit - the stretch</figcaption>
                        </figure>
                    </div>
                </div>

                <div class="film-hopkingdom">
                    <h2 class="film-hopkingdom__title">Ride Clips</h2>
                    <div class="video-grid">
                        <article class="video-card">
                            <div class="video-card__embed">
                                <iframe
                                    src="https://www.youtube.com/embed/mAMI1-DvpKs"
                                    title="YouTube — ride video"
                                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                                    referrerpolicy="strict-origin-when-cross-origin"
                                    allowfullscreen
                                    loading="lazy"></iframe>
                            </div>
                            <div class="video-card__body">
                                <h3>Ride clip</h3>
                                <p><a href="https://www.youtube.com/watch?v=mAMI1-DvpKs" rel="noopener noreferrer" target="_blank">Open on YouTube</a></p>
                            </div>
                        </article>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer class="footer">
        <div class="container">
            <nav class="page-nav-arrows" id="page-nav-arrows" aria-label="Site sections" hidden>
                <div class="page-nav-arrows__inner">
                    <a class="page-nav-arrows__link page-nav-arrows__link--prev" href="/mag/" aria-label="Back">
                        <svg class="page-nav-arrows__tri" width="14" height="14" viewBox="0 0 10 10" aria-hidden="true" focusable="false">
                            <polygon points="7,1 2,5 7,9" fill="currentColor"/>
                        </svg>
                    </a>
                    <a class="page-nav-arrows__link page-nav-arrows__link--next" href="/visual/" aria-label="Forward">
                        <svg class="page-nav-arrows__tri" width="14" height="14" viewBox="0 0 10 10" aria-hidden="true" focusable="false">
                            <polygon points="3,1 8,5 3,9" fill="currentColor"/>
                        </svg>
                    </a>
                </div>
            </nav>
            <p>&copy; 2026 Vic Valentine. All rights reserved.</p>
        </div>
    </footer>
    <div id="music-dock" class="music-dock music-dock--embed-only" aria-hidden="true">
        <div class="music-spotify-embed-anchor-wrap">
            <div id="music-spotify-embed-anchor"></div>
        </div>
    </div>
    <div class="lightbox" id="lightbox">
        <button class="lightbox__close" aria-label="Close">&times;</button>
        <button class="lightbox__nav lightbox__nav--prev" aria-label="Previous">&#8249;</button>
        <button class="lightbox__nav lightbox__nav--next" aria-label="Next">&#8250;</button>
        <img src="" alt="">
    </div>
    <script src="/static/js/config.js"></script>
    <script src="/static/js/page-nav-arrows.js"></script>
    <script src="/static/js/main.js"></script>
    <script src="/static/js/music-spotify-player.js"></script>
    <script src="https://open.spotify.com/embed/iframe-api/v1" async></script>
</body>
</html>
