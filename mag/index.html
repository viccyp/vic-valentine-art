<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#010101">
    <meta name="robots" content="index, follow">
    <meta name="author" content="Vic Valentine">
    <script src="https://cdn.jsdelivr.net/npm/@hotwired/turbo@8.0.12/dist/turbo.es2017-umd.js"></script>
    <script src="/static/js/turbo-persist-music-dock.js"></script>
    <script src="/static/js/turbo-scroll-top.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Datatype:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <title>Mag — Vic Valentine</title>
    <meta name="description" content="Mag — writing and magazine by Vic Valentine.">
</head>
<body>
    <nav class="nav">
        <div class="container nav__inner">
            <div class="nav__spacer" aria-hidden="true"></div>
            <div class="nav__center">
                <div class="nav__links">
                    <a href="/" data-turbo="false">Home</a>
                    <a href="/visual/">Visual</a>
                    <a href="/audio/">Audio</a>
                    <a href="/code/">Code</a>
                    <a href="/mag/">Mag</a>
                </div>
            </div>
            <div class="nav__trailing">
                <button type="button" class="nav__hamburger" aria-label="Menu" aria-expanded="false">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
        <a href="/admin/" class="nav__admin-icon" data-turbo="false" aria-label="Admin" title="Admin">
            <svg class="nav__admin-icon__svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="3" y="3" width="7" height="9" rx="1.2"/>
                <rect x="14" y="3" width="7" height="5" rx="1.2"/>
                <rect x="14" y="12" width="7" height="9" rx="1.2"/>
                <rect x="3" y="16" width="7" height="5" rx="1.2"/>
            </svg>
        </a>
    </nav>
    <main>
        <section class="section" style="padding-top: calc(var(--nav-height) + 4rem);">
            <div class="container">
                <div class="section__header">
                    <h2>Magazine</h2>
                </div>
                <div class="mag-grid" id="blog-list">
                    <p style="text-align: center; color: var(--color-text-muted);">Loading&hellip;</p>
                </div>
            </div>
        </section>
    </main>
    <footer class="footer">
        <div class="container">
            <nav class="page-nav-arrows" id="page-nav-arrows" aria-label="Site sections" hidden>
                <div class="page-nav-arrows__inner">
                    <a class="page-nav-arrows__link page-nav-arrows__link--prev" href="/mag/" aria-label="Back">
                        <svg class="page-nav-arrows__tri" width="14" height="14" viewBox="0 0 10 10" aria-hidden="true" focusable="false">
                            <polygon points="7,1 2,5 7,9" fill="currentColor"/>
                        </svg>
                    </a>
                    <a class="page-nav-arrows__link page-nav-arrows__link--next" href="/visual/" aria-label="Forward">
                        <svg class="page-nav-arrows__tri" width="14" height="14" viewBox="0 0 10 10" aria-hidden="true" focusable="false">
                            <polygon points="3,1 8,5 3,9" fill="currentColor"/>
                        </svg>
                    </a>
                </div>
            </nav>
            <p>&copy; 2026 Vic Valentine. All rights reserved.</p>
        </div>
    </footer>
    <div id="music-dock" class="music-dock music-dock--embed-only" aria-hidden="true">
        <div class="music-spotify-embed-anchor-wrap">
            <div id="music-spotify-embed-anchor"></div>
        </div>
    </div>
    <div class="lightbox" id="lightbox">
        <button class="lightbox__close" aria-label="Close">&times;</button>
        <button class="lightbox__nav lightbox__nav--prev" aria-label="Previous">&#8249;</button>
        <button class="lightbox__nav lightbox__nav--next" aria-label="Next">&#8250;</button>
        <img src="" alt="">
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="/static/js/supabase-runtime.js"></script>
    <script src="/static/js/config.js"></script>
    <script src="/static/js/page-nav-arrows.js"></script>
    <script src="/static/js/main.js"></script>
    <script src="/static/js/music-spotify-player.js"></script>
    <script src="https://open.spotify.com/embed/iframe-api/v1" async></script>
    <script>
    let __vvMagLoadGen = 0;

    async function loadMagList() {
        const gen = ++__vvMagLoadGen;
        const list = document.getElementById('blog-list');
        if (!list) return;
        list.innerHTML = '<p style="text-align: center; color: var(--color-text-muted);">Loading&hellip;</p>';
        const client = await waitForSupabaseClient();
        if (gen !== __vvMagLoadGen) return;
        if (!client) {
            list.innerHTML = '<p style="text-align:center;color:var(--color-text-muted);max-width:40em;margin-inline:auto;">Loading&hellip; If the content does not appear, reload the page.</p>';
            return;
        }

        const { data: posts, error } = await client
            .from('posts')
            .select('*')
            .eq('published', 1)
            .order('created_at', { ascending: false });

        if (gen !== __vvMagLoadGen) return;
        if (error) {
            list.innerHTML = `<p style="text-align:center;color:var(--color-text-muted);max-width:36em;margin-inline:auto;">Could not load articles (${escHtml(error.message)}). Check the browser Network tab for <code>rest/v1/posts</code>, confirm <code>npm run build</code> on deploy creates <code>supabase-runtime.js</code>, and run <code>scripts/posts-blog-schema.sql</code> in Supabase (RLS + <code>posts</code> table).</p>`;
            return;
        }

        if (!posts || !posts.length) {
            list.innerHTML = '<p style="text-align:center;color:var(--color-text-muted);">No articles yet. Publish an article in Admin or set <code>published = 1</code> on rows in the <code>posts</code> table.</p>';
            return;
        }

        list.innerHTML = posts
            .map(p => `
            <a href="/post/?slug=${encodeURIComponent(p.slug)}" class="mag-card">
                <div class="mag-card__image">
                    <img src="${p.cover_image ? storageUrl(p.cover_image) : 'https://placehold.co/800x500/1a1a1a/333?text=No+Cover'}" alt="${escHtml(p.cover_alt || '')}">
                </div>
                <div class="mag-card__body">
                    <h3 class="mag-card__title">${escHtml(p.title)}</h3>
                    <p class="mag-card__subheading">${escHtml(p.subheading || '')}</p>
                </div>
            </a>`)
            .join('');
    }

    document.addEventListener('DOMContentLoaded', loadMagList);
    document.addEventListener('turbo:load', loadMagList);

    window.addEventListener('load', function () {
        const list = document.getElementById('blog-list');
        if (!list) return;
        const t = list.textContent || '';
        if (/If the content does not appear|Could not load articles/i.test(t)) {
            loadMagList();
        }
    });
    </script>
</body>
</html>
