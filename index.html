    <meta name="description" content="Vic Valentine — official site. London drummer, producer, bassist, filmmaker, editor, and web &amp; software developer.">

<body class="home">
    <div class="page-bg-video" aria-hidden="true">
        <video class="page-bg-video__media" autoplay muted loop playsinline webkit-playsinline preload="auto" tabindex="-1" disablepictureinpicture controlslist="nodownload nofullscreen noremoteplayback noplaybackrate" data-desktop-src="/public/istanbul.mp4" data-mobile-src="/public/istanbul-mobile.mp4"></video>
        <div class="page-bg-video__veil"></div>
    </div>
    <nav class="nav">
        <div class="container nav__inner">
            <div class="nav__spacer" aria-hidden="true"></div>
            <div class="nav__center">
                <div class="nav__links">
                    <a href="/">Home</a>
                    <a href="/visual/">Visual</a>
                    <a href="/audio/">Audio</a>
                    <a href="/code/">Code</a>
                    <a href="/mag/">Mag</a>
                </div>
            </div>
            <div class="nav__trailing">
                <button type="button" class="nav__hamburger" aria-label="Menu" aria-expanded="false">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
        <a href="/admin/" class="nav__admin-icon" data-turbo="false" aria-label="Admin" title="Admin">
            <svg class="nav__admin-icon__svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="3" y="3" width="7" height="9" rx="1.2"/>
                <rect x="14" y="3" width="7" height="5" rx="1.2"/>
                <rect x="14" y="12" width="7" height="9" rx="1.2"/>
                <rect x="3" y="16" width="7" height="5" rx="1.2"/>
            </svg>
        </a>
    </nav>
    <main class="home-main">
        <section class="hero hero--split hero--below-video">
            <div class="container hero__split">
                <figure class="hero__media hero-reveal">
                    <img src="/public/vic.JPG" alt="Vic Valentine" width="560" height="747">
                </figure>
                <div class="hero__content">
                    <div class="hero-reveal hero-reveal--copy">
                        <h1>Vic Valentine</h1>
                        <p class="hero__intro">Drummer, producer, bassist, filmmaker & editor, web & software developer. Based in London.</p>
                    </div>
                </div>
            </div>
        </section>

        <div class="home-enter-bar">
            <div class="container home-enter-bar__inner">
                <a href="/visual/" class="btn btn--outline home-enter">enter</a>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <nav class="page-nav-arrows" id="page-nav-arrows" aria-label="Site sections" hidden>
                <div class="page-nav-arrows__inner">
                    <a class="page-nav-arrows__link page-nav-arrows__link--prev" href="/mag/" aria-label="Back">
                        <svg class="page-nav-arrows__tri" width="14" height="14" viewBox="0 0 10 10" aria-hidden="true" focusable="false">
                            <polygon points="7,1 2,5 7,9" fill="currentColor"/>
                        </svg>
                    </a>
                    <a class="page-nav-arrows__link page-nav-arrows__link--next" href="/visual/" aria-label="Forward">
                        <svg class="page-nav-arrows__tri" width="14" height="14" viewBox="0 0 10 10" aria-hidden="true" focusable="false">

            <p>&copy; 2026 Vic Valentine. All rights reserved.</p>
        </div>

    <div id="music-dock" class="music-dock music-dock--embed-only" aria-hidden="true">
        <div class="music-spotify-embed-anchor-wrap">
            <div id="music-spotify-embed-anchor"></div>
        </div>
    </div>
    <div class="lightbox" id="lightbox">
        <button class="lightbox__close" aria-label="Close">&times;</button>
        <button class="lightbox__nav lightbox__nav--prev" aria-label="Previous">&#8249;</button>
        <button class="lightbox__nav lightbox__nav--next" aria-label="Next">&#8250;</button>
        <img src="" alt="">
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="/static/js/supabase-runtime.js"></script>
    <script src="/static/js/config.js"></script>
    <script src="/static/js/page-nav-arrows.js"></script>
    <script src="/static/js/main.js"></script>
    <script src="/static/js/music-spotify-player.js"></script>
    <script src="https://open.spotify.com/embed/iframe-api/v1" async></script>
    <script>
    (function () {
        const bg = document.querySelector('.page-bg-video');
        const heroSplit = document.querySelector('.hero__split');
        const heroReveals = document.querySelectorAll('.hero-reveal');
        const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const maxVeilScroll = 520;

        function onScroll() {
            if (bg) {
                const y = window.scrollY || document.documentElement.scrollTop;
                const t = Math.min(1, y / maxVeilScroll);
                bg.style.setProperty('--home-veil-blur', (t * 12).toFixed(2) + 'px');
                bg.style.setProperty('--home-veil-alpha', (t * 0.38).toFixed(4));
            }
            if (!heroSplit || !heroReveals.length) return;
            if (reduceMotion) {
                heroReveals.forEach(function (el) {
                    el.style.filter = '';
                    el.style.opacity = '';
                });
                return;
            }
            const rect = heroSplit.getBoundingClientRect();
            const vh = window.innerHeight || 1;
            const blurStart = vh * 0.88;
            const blurEnd = vh * 0.42;
            let revealT;
            if (rect.top >= blurStart) revealT = 0;
            else if (rect.top <= blurEnd) revealT = 1;
            else revealT = (blurStart - rect.top) / (blurStart - blurEnd);
            const blurPx = (1 - revealT) * 14;
            const opacity = 0.36 + revealT * 0.64;
            const filter = 'blur(' + blurPx.toFixed(2) + 'px)';
            const op = opacity.toFixed(3);
            heroReveals.forEach(function (el) {
                el.style.filter = filter;
                el.style.opacity = op;
            });
        }

        onScroll();
        window.addEventListener('scroll', onScroll, { passive: true });
        window.addEventListener('resize', onScroll, { passive: true });
    })();
    </script>
</body>
</html>
