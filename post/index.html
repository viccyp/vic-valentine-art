<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#010101">
    <meta name="robots" content="index, follow">
    <meta name="author" content="Vic Valentine">
    <script src="https://cdn.jsdelivr.net/npm/@hotwired/turbo@8.0.12/dist/turbo.es2017-umd.js"></script>
    <script src="/static/js/turbo-persist-music-dock.js"></script>
    <script src="/static/js/turbo-scroll-top.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Datatype:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <title>Loading… — Vic Valentine</title>
    <meta name="description" content="Article from Mag by Vic Valentine.">
</head>
<body>
    <nav class="nav">
        <div class="container nav__inner">
            <div class="nav__spacer" aria-hidden="true"></div>
            <div class="nav__center">
                <div class="nav__links">
                    <a href="/">Home</a>
                    <a href="/visual/">Visual</a>
                    <a href="/audio/">Audio</a>
                    <a href="/code/">Code</a>
                    <a href="/mag/">Mag</a>
                </div>
            </div>
            <div class="nav__trailing">
                <button type="button" class="nav__hamburger" aria-label="Menu" aria-expanded="false">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
        <a href="/admin/" class="nav__admin-icon" data-turbo="false" aria-label="Admin" title="Admin">
            <svg class="nav__admin-icon__svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="3" y="3" width="7" height="9" rx="1.2"/>
                <rect x="14" y="3" width="7" height="5" rx="1.2"/>
                <rect x="14" y="12" width="7" height="9" rx="1.2"/>
                <rect x="3" y="16" width="7" height="5" rx="1.2"/>
            </svg>
        </a>
    </nav>
    <main>
        <article class="photoblog-post" id="post-container">
            <p style="text-align:center; padding: calc(var(--nav-height) + 4rem) 2rem 4rem; color: var(--color-text-muted);">Loading&hellip;</p>
        </article>
    </main>
    <footer class="footer">
        <div class="container">
            <nav class="page-nav-arrows" id="page-nav-arrows" aria-label="Site sections" hidden>
                <div class="page-nav-arrows__inner">
                    <a class="page-nav-arrows__link page-nav-arrows__link--prev" href="/mag/" aria-label="Back">
                        <svg class="page-nav-arrows__tri" width="14" height="14" viewBox="0 0 10 10" aria-hidden="true" focusable="false">
                            <polygon points="7,1 2,5 7,9" fill="currentColor"/>
                        </svg>
                    </a>
                    <a class="page-nav-arrows__link page-nav-arrows__link--next" href="/visual/" aria-label="Forward">
                        <svg class="page-nav-arrows__tri" width="14" height="14" viewBox="0 0 10 10" aria-hidden="true" focusable="false">
                            <polygon points="3,1 8,5 3,9" fill="currentColor"/>
                        </svg>
                    </a>
                </div>
            </nav>
            <p>&copy; 2026 Vic Valentine. All rights reserved.</p>
        </div>
    </footer>
    <div id="music-dock" class="music-dock music-dock--embed-only" aria-hidden="true">
        <div class="music-spotify-embed-anchor-wrap">
            <div id="music-spotify-embed-anchor"></div>
        </div>
    </div>
    <div class="lightbox" id="lightbox">
        <button class="lightbox__close" aria-label="Close">&times;</button>
        <button class="lightbox__nav lightbox__nav--prev" aria-label="Previous">&#8249;</button>
        <button class="lightbox__nav lightbox__nav--next" aria-label="Next">&#8250;</button>
        <img src="" alt="">
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="/static/js/supabase-runtime.js"></script>
    <script src="/static/js/config.js"></script>
    <script src="/static/js/page-nav-arrows.js"></script>
    <script src="/static/js/main.js"></script>
    <script src="/static/js/music-spotify-player.js"></script>
    <script src="https://open.spotify.com/embed/iframe-api/v1" async></script>
    <script>
    let __vvPostLoadGen = 0;

    async function loadPostPage() {
        const gen = ++__vvPostLoadGen;
        const slug = new URLSearchParams(location.search).get('slug');
        if (!slug) { window.location.href = '/mag/'; return; }

        const el = document.getElementById('post-container');
        if (!el) return;
        el.innerHTML = '<p style="text-align:center; padding: calc(var(--nav-height) + 4rem) 2rem 4rem; color: var(--color-text-muted);">Loading&hellip;</p>';
        const client = await waitForSupabaseClient();
        if (gen !== __vvPostLoadGen) return;
        if (!client) {
            el.innerHTML = '<p style="text-align:center; padding: calc(var(--nav-height) + 4rem) 2rem 4rem; color: var(--color-text-muted);max-width:40em;margin-inline:auto;">Loading&hellip; If the content does not appear, reload the page.</p>';
            return;
        }

        const { data: post, error } = await client.from('posts').select('*').eq('slug', slug).eq('published', 1).single();
        if (gen !== __vvPostLoadGen) return;

        if (error || !post) {
            el.innerHTML = '<p style="text-align:center; padding: calc(var(--nav-height) + 4rem) 2rem 4rem; color: var(--color-text-muted);">Article not found.</p>';
            return;
        }

        document.title = `${post.title} — Vic Valentine`;
        const created = formatDate(post.created_at);
        const updated = formatDate(post.updated_at);
        const showUpdated = (post.updated_at || '').slice(0, 10) !== (post.created_at || '').slice(0, 10);

        let contentHtml = post.body_html || '';
        if (!contentHtml) {
            let blocks; try { blocks = JSON.parse(post.body); } catch { blocks = []; }
            contentHtml = renderBlocksToHtml(Array.isArray(blocks) ? blocks : []);
        }

        el.innerHTML = `
            <header class="photoblog-post__header">
                <div class="container container--narrow">
                    <h1 class="photoblog-post__title">${escHtml(post.title)}</h1>
                    <div class="photoblog-post__meta">
                        <span class="photoblog-post__author">Vic Valentine</span>
                        <span class="photoblog-post__meta-sep" aria-hidden="true">&middot;</span>
                        <time class="photoblog-post__date">${created}</time>
                        <span class="photoblog-post__meta-sep" aria-hidden="true">&middot;</span>
                        <span class="photoblog-post__read">${readTime(post)} min read</span>
                    </div>
                    ${showUpdated ? `<p class="photoblog-post__updated">Updated: ${updated}</p>` : ''}
                </div>
            </header>
            <div class="photoblog-post__content">
                <div class="container container--narrow">${contentHtml}</div>
            </div>`;
    }
    document.addEventListener('DOMContentLoaded', loadPostPage);
    document.addEventListener('turbo:load', loadPostPage);
    window.addEventListener('load', function () {
        const el = document.getElementById('post-container');
        if (!el) return;
        const t = el.textContent || '';
        if (/If the content does not appear/i.test(t)) {
            loadPostPage();
        }
    });
    </script>
</body>
</html>
