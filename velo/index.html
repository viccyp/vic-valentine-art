<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#010101">
    <script src="https://cdn.jsdelivr.net/npm/@hotwired/turbo@8.0.12/dist/turbo.es2017-umd.js"></script>
    <script src="/static/js/turbo-persist-music-dock.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Datatype:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <title>Velo — Vic Valentine</title>
</head>
<body class="page-velo">
    <nav class="nav">
        <div class="container nav__inner">
            <div class="nav__spacer" aria-hidden="true"></div>
            <div class="nav__center">
                <div class="nav__links">
                    <a href="/">Home</a>
                    <a href="/visual/">Visual</a>
                    <a href="/audio/">Audio</a>
                    <a href="/velo/">Velo</a>
                    <a href="/code/">Code</a>
                    <a href="/blog/">Blog</a>
                </div>
            </div>
            <div class="nav__trailing">
                <button type="button" class="nav__hamburger" aria-label="Menu" aria-expanded="false">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
        <a href="/admin/" class="nav__admin-icon" data-turbo="false" aria-label="Admin" title="Admin">
            <svg class="nav__admin-icon__svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="3" y="3" width="7" height="9" rx="1.2"/>
                <rect x="14" y="3" width="7" height="5" rx="1.2"/>
                <rect x="14" y="12" width="7" height="9" rx="1.2"/>
                <rect x="3" y="16" width="7" height="5" rx="1.2"/>
            </svg>
        </a>
    </nav>
    <main>
        <section class="section section--velo">
            <div class="container">
                <header class="section__header">
                    <h2>Velo</h2>
                    <p>Ride clips</p>
                </header>

                <div class="video-grid">
                    <article class="video-card">
                        <div class="video-card__embed">
                            <iframe
                                src="https://www.youtube.com/embed/mAMI1-DvpKs"
                                title="YouTube — ride video"
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                                referrerpolicy="strict-origin-when-cross-origin"
                                allowfullscreen
                                loading="lazy"></iframe>
                        </div>
                        <div class="video-card__body">
                            <h3>Ride clip</h3>
                            <p><a href="https://www.youtube.com/watch?v=mAMI1-DvpKs" rel="noopener noreferrer" target="_blank">Open on YouTube</a></p>
                        </div>
                    </article>
                </div>

                <div class="velo-gallery-block" hidden>
                    <h3 class="velo-gallery-title">Photos</h3>
                    <div class="velo-gallery">
                        <figure class="velo-still" data-lightbox>
                            <img src="/public/bike-01.jpg" alt="Cycling, photo 1" width="1200" height="900" loading="lazy">
                            <figcaption class="velo-still__caption">Caption</figcaption>
                        </figure>
                        <figure class="velo-still" data-lightbox>
                            <img src="/public/bike-02.jpg" alt="Cycling, photo 2" width="1200" height="900" loading="lazy">
                            <figcaption class="velo-still__caption">Caption</figcaption>
                        </figure>
                        <figure class="velo-still" data-lightbox>
                            <img src="/public/bike-03.jpg" alt="Cycling, photo 3" width="1200" height="900" loading="lazy">
                            <figcaption class="velo-still__caption">Caption</figcaption>
                        </figure>
                        <figure class="velo-still" data-lightbox>
                            <img src="/public/bike-04.jpg" alt="Cycling, photo 4" width="1200" height="900" loading="lazy">
                            <figcaption class="velo-still__caption">Caption</figcaption>
                        </figure>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer class="footer">
        <div class="container">
            <nav class="page-nav-arrows" id="page-nav-arrows" aria-label="Site sections" hidden>
                <div class="page-nav-arrows__inner">
                    <a class="page-nav-arrows__link btn btn--outline section-nav-btn page-nav-arrows__link--prev" href="/blog/">back</a>
                    <a class="page-nav-arrows__link btn btn--outline section-nav-btn page-nav-arrows__link--next" href="/visual/">forward</a>
                </div>
            </nav>
            <p>&copy; 2026 Vic Valentine. All rights reserved.</p>
        </div>
    </footer>
    <div id="music-dock" class="music-dock music-dock--embed-only" aria-hidden="true">
        <div class="music-spotify-embed-anchor-wrap">
            <div id="music-spotify-embed-anchor"></div>
        </div>
    </div>
    <div class="lightbox" id="lightbox">
        <button class="lightbox__close" aria-label="Close">&times;</button>
        <button class="lightbox__nav lightbox__nav--prev" aria-label="Previous">&#8249;</button>
        <button class="lightbox__nav lightbox__nav--next" aria-label="Next">&#8250;</button>
        <img src="" alt="">
    </div>
    <script src="/static/js/config.js"></script>
    <script src="/static/js/main.js"></script>
    <script src="/static/js/music-spotify-player.js"></script>
    <script src="https://open.spotify.com/embed/iframe-api/v1" async></script>
</body>
</html>
