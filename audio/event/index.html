<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#010101">
    <script src="https://cdn.jsdelivr.net/npm/@hotwired/turbo@8.0.12/dist/turbo.es2017-umd.js"></script>
    <script src="/static/js/turbo-persist-music-dock.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Datatype:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <title>Event — Vic Valentine</title>
</head>
<body>
    <nav class="nav">
        <div class="container nav__inner">
            <div class="nav__spacer" aria-hidden="true"></div>
            <div class="nav__center">
                <div class="nav__links">
                    <a href="/">Home</a>
                    <a href="/visual/">Visual</a>
                    <a href="/audio/">Audio</a>
                    <a href="/velo/">Velo</a>
                    <a href="/code/">Code</a>
                    <a href="/blog/">Blog</a>
                </div>
            </div>
            <div class="nav__trailing">
                <button type="button" class="nav__hamburger" aria-label="Menu" aria-expanded="false">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
        <a href="/admin/" class="nav__admin-icon" data-turbo="false" aria-label="Admin" title="Admin">
            <svg class="nav__admin-icon__svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="3" y="3" width="7" height="9" rx="1.2"/>
                <rect x="14" y="3" width="7" height="5" rx="1.2"/>
                <rect x="14" y="12" width="7" height="9" rx="1.2"/>
                <rect x="3" y="16" width="7" height="5" rx="1.2"/>
            </svg>
        </a>
    </nav>
    <main>
        <article class="music-event" id="music-event-root">
            <p class="music-event__loading">Loading&hellip;</p>
        </article>
    </main>
    <footer class="footer">
        <div class="container">
            <nav class="page-nav-arrows" id="page-nav-arrows" aria-label="Site sections" hidden>
                <div class="page-nav-arrows__inner">
                    <a class="page-nav-arrows__btn page-nav-arrows__btn--prev" href="/blog/" aria-label="Previous section">
                        <svg class="page-nav-arrows__icon" width="28" height="28" viewBox="0 0 24 24" aria-hidden="true"><polygon points="16,3 6,12 16,21"/></svg>
                    </a>
                    <a class="page-nav-arrows__btn page-nav-arrows__btn--next" href="/visual/" aria-label="Next section">
                        <svg class="page-nav-arrows__icon" width="28" height="28" viewBox="0 0 24 24" aria-hidden="true"><polygon points="8,3 18,12 8,21"/></svg>
                    </a>
                </div>
            </nav>
            <p>&copy; 2026 Vic Valentine. All rights reserved.</p>
        </div>
    </footer>
    <div id="music-dock" class="music-dock music-dock--embed-only" aria-hidden="true">
        <div class="music-spotify-embed-anchor-wrap">
            <div id="music-spotify-embed-anchor"></div>
        </div>
    </div>
    <div class="lightbox" id="lightbox">
        <button class="lightbox__close" aria-label="Close">&times;</button>
        <button class="lightbox__nav lightbox__nav--prev" aria-label="Previous">&#8249;</button>
        <button class="lightbox__nav lightbox__nav--next" aria-label="Next">&#8250;</button>
        <img src="" alt="">
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="/static/js/supabase-runtime.js"></script>
    <script src="/static/js/config.js"></script>
    <script src="/static/js/page-nav-arrows.js"></script>
    <script src="/static/js/main.js"></script>
    <script src="/static/js/music-spotify-player.js"></script>
    <script src="https://open.spotify.com/embed/iframe-api/v1" async></script>
    <script>
    let __vvEventLoadGen = 0;

    async function loadMusicEventPage() {
        const gen = ++__vvEventLoadGen;
        const id = new URLSearchParams(location.search).get('id');
        const el = document.getElementById('music-event-root');
        if (!el) return;
        if (!id || !/^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(id)) {
            el.innerHTML = '<p class="music-event__empty"><a href="/audio/">Back to Audio</a></p>';
            return;
        }
        el.innerHTML = '<p class="music-event__loading">Loading&hellip;</p>';
        const client = await waitForSupabaseClient();
        if (gen !== __vvEventLoadGen) return;
        if (!client) {
            el.innerHTML = '<p class="music-event__empty">Unavailable — run <code>npm run config</code> and set <code>.env</code>. <a href="/audio/">Back to Audio</a></p>';
            return;
        }

        function absolutHttpUrl(u) {
            if (!u || typeof u !== 'string') return '';
            try {
                const x = new URL(u);
                return x.protocol === 'http:' || x.protocol === 'https:' ? x.href : '';
            } catch (_) { return ''; }
        }

        const { data: show, error: showErr } = await client
            .from('events')
            .select('id, name, description, event_date, location, price, image_url, category, is_published')
            .eq('id', id)
            .eq('is_published', true)
            .eq('category', 'music')
            .maybeSingle();

        if (showErr || !show) {
            el.innerHTML = '<p class="music-event__empty">Event not found. <a href="/audio/">Back to Audio</a></p>';
            return;
        }

        const { data: extraRows } = await db
            .from('event_gallery_images')
            .select('image_url, sort_order')
            .eq('event_id', show.id)
            .order('sort_order', { ascending: true });

        const title = show.name || 'Event';
        document.title = `${title} — Vic Valentine`;

        const when = formatDate(show.event_date);
        const loc = escHtml(show.location || '');
        const desc = show.description
            ? `<div class="music-event__description"><p>${escHtml(show.description).replace(/\n/g, '<br>')}</p></div>`
            : '';

        const today = new Date();
        const startOfLocalDay = (d) => new Date(d.getFullYear(), d.getMonth(), d.getDate());
        const eventStart = show.event_date ? new Date(show.event_date) : null;
        const pastEvent =
            !!(
                eventStart &&
                !Number.isNaN(eventStart.getTime()) &&
                startOfLocalDay(eventStart) < startOfLocalDay(today)
            );
        const priceLine =
            !pastEvent && show.price != null && String(show.price).trim() !== ''
                ? `<p class="music-event__meta-line">Price: ${escHtml(String(show.price))}</p>`
                : '';

        const galleryItems = [];
        const mainImg = absolutHttpUrl(show.image_url);
        if (mainImg) galleryItems.push({ src: mainImg, alt: title });
        if (extraRows && extraRows.length) {
            for (const row of extraRows) {
                const src = absolutHttpUrl(row.image_url);
                if (src && !galleryItems.some(g => g.src === src)) galleryItems.push({ src, alt: title });
            }
        }

        const gallery = galleryItems.length
            ? `<div class="music-event__gallery">
                <h2 class="music-event__gallery-title">Gallery</h2>
                <div class="music-event__gallery-grid">
                    ${galleryItems.map(g => `<figure class="music-event__figure" data-lightbox><img src="${g.src}" alt="${escHtml(g.alt)}"></figure>`).join('')}
                </div>
               </div>`
            : '';

        if (gen !== __vvEventLoadGen) return;
        el.innerHTML = `
            <header class="music-event__header">
                <div class="container container--narrow">
                    <p class="music-event__back"><a href="/audio/">← Audio</a></p>
                    <h1 class="music-event__title">${escHtml(title)}</h1>
                    <p class="music-event__when"><time datetime="${escHtml((show.event_date || '').slice(0, 16))}">${escHtml(when)}</time></p>
                    <p class="music-event__location">${loc}</p>
                    ${priceLine}
                </div>
            </header>
            <div class="music-event__body">
                <div class="container container--narrow">
                    ${desc}
                    ${gallery}
                </div>
            </div>`;
    }
    document.addEventListener('DOMContentLoaded', loadMusicEventPage);
    document.addEventListener('turbo:load', loadMusicEventPage);
    window.addEventListener('load', function () {
        const el = document.getElementById('music-event-root');
        if (!el) return;
        const t = el.textContent || '';
        if (el.querySelector('.music-event__loading') || /npm run config|Unavailable/i.test(t)) {
            loadMusicEventPage();
        }
    });
    </script>
</body>
</html>
